services:
  postgres:
    image: postgres:16-alpine
    container_name: evzone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-evzone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      POSTGRES_DB: ${DB_NAME:-evzone_platform}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-evzone} -d ${DB_NAME:-evzone_platform}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql

  redis:
    image: redis:7-alpine
    container_name: evzone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  kafka:
    image: apache/kafka:3.7.0
    container_name: evzone-kafka
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9092"
      - "127.0.0.1:9095:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9095
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: evzone-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:${STORAGE_PORT:-9000}:9000"
      - "127.0.0.1:${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evzone-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-evzone}
      DB_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      DB_NAME: ${DB_NAME:-evzone_platform}
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-platform
      KAFKA_CONSUMER_GROUP: evzone-worker-events
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-evzone-assets}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npm", "run", "start:dev" ]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker-events:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-events
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-platform
      KAFKA_CONSUMER_GROUP: evzone-worker-events
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-events/src/main.ts" ]

  worker-notifications:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-notifications
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET:-evzone-assets}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: "true"
      KAFKA_BROKERS: kafka:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-notifications/src/main.ts" ]

  worker-media:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-media
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET:-evzone-assets}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: "true"
      KAFKA_BROKERS: kafka:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-media/src/main.ts" ]

  worker-compliance:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-compliance
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-compliance/src/main.ts" ]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-scheduler
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/scheduler/src/main.ts" ]

  worker-webhooks:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-webhooks
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-platform
      KAFKA_CONSUMER_GROUP: evzone-worker-events
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_WEBHOOK_HASH: ${FLUTTERWAVE_WEBHOOK_HASH:-}
      PAYTOTA_SECRET_KEY: ${PAYTOTA_SECRET_KEY:-}
      PAYTOTA_WEBHOOK_SECRET: ${PAYTOTA_WEBHOOK_SECRET:-}
      SMILE_IDENTITY_API_KEY: ${SMILE_IDENTITY_API_KEY:-}
      SMILE_IDENTITY_PARTNER_ID: ${SMILE_IDENTITY_PARTNER_ID:-}
      SMILE_IDENTITY_WEBHOOK_SECRET: ${SMILE_IDENTITY_WEBHOOK_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: [ "npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-webhooks/src/main.ts" ]

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:

networks:
  evzone-network:
    driver: bridge
