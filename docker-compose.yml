version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: evzone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-evzone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      POSTGRES_DB: ${DB_NAME:-evzone_platform}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-evzone} -d ${DB_NAME:-evzone_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network

  # Redis Cache (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: evzone-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network

  # NestJS Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evzone-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-evzone}
      DB_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      DB_NAME: ${DB_NAME:-evzone_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - evzone-network
    volumes:
      - uploads:/app/uploads

volumes:
  postgres-data:
  redis-data:
  uploads:

networks:
  evzone-network:
    driver: bridge
