services:
  postgres:
    image: postgres:16-alpine
    container_name: evzone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-evzone}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      POSTGRES_DB: ${DB_NAME:-evzone_platform}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-evzone} -d ${DB_NAME:-evzone_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network

  redis:
    image: redis:7-alpine
    container_name: evzone-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evzone-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: evzone-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_INTERNAL_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - evzone-network

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: evzone-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "${STORAGE_PORT:-9000}:9000"
      - "${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - evzone-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-evzone}
      DB_PASSWORD: ${DB_PASSWORD:-evzone_secret}
      DB_NAME: ${DB_NAME:-evzone_platform}
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-platform
      KAFKA_CONSUMER_GROUP: evzone-worker-events
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-evzone-assets}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-secret}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - evzone-network
    command: ["npm", "run", "start:dev"]

  worker-events:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-events
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      DIRECT_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-platform
      KAFKA_CONSUMER_GROUP: evzone-worker-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - evzone-network
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-events/src/main.ts"]

  worker-media:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-media
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET:-evzone-assets}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_FORCE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - evzone-network
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-media/src/main.ts"]

  worker-compliance:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-worker-compliance
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evzone-network
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "apps/worker-compliance/src/main.ts"]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: evzone-scheduler
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-evzone}:${DB_PASSWORD:-evzone_secret}@postgres:5432/${DB_NAME:-evzone_platform}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evzone-network
    command: ["npx", "ts-node", "-r", "tsconfig-paths/register", "apps/scheduler/src/main.ts"]

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:

networks:
  evzone-network:
    driver: bridge
